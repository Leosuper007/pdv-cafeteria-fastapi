<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Cafeteria Grão — Cozinha</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0d0d0d; --surface:#161616; --card:#1e1e1e; --border:#2a2a2a;
  --amber:#f5a623; --green:#27ae60; --red:#e74c3c; --blue:#3498db;
  --white:#ffffff; --muted:#666666; --text:#eeeeee;
}
html,body{width:100%;height:100%;overflow:hidden;}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;height:100vh;}

/* HEADER */
header{background:var(--surface);border-bottom:2px solid var(--border);padding:0 28px;height:70px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.header-left{display:flex;align-items:center;gap:16px;}
.header-title{font-family:'Bebas Neue',sans-serif;font-size:32px;letter-spacing:.08em;color:var(--amber);}
.header-sub{font-size:13px;color:var(--muted);margin-left:2px;}
.header-stats{display:flex;align-items:center;gap:24px;}
.stat{text-align:center;}
.stat-val{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--amber);}
.stat-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;}
.header-clock{font-family:'Bebas Neue',sans-serif;font-size:38px;color:var(--white);letter-spacing:.05em;}

/* COLUNAS */
.columns{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;padding:16px 20px;flex:1;min-height:0;overflow:hidden;}
.column{display:flex;flex-direction:column;gap:0;min-height:0;}
.column-header{padding:12px 16px;border-radius:12px 12px 0 0;display:flex;align-items:center;gap:10px;font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:.06em;flex-shrink:0;}
.column-header.new{background:#2d1a00;color:var(--amber);}
.column-header.making{background:#0d2d1a;color:var(--green);}
.column-header.done{background:#1a1a2d;color:var(--blue);}
.col-dot{width:10px;height:10px;border-radius:50%;}
.col-dot.new{background:var(--amber);}
.col-dot.making{background:var(--green);}
.col-dot.done{background:var(--blue);}
.col-count{margin-left:auto;background:rgba(255,255,255,0.1);padding:3px 12px;border-radius:999px;font-size:15px;}
.column-body{background:var(--surface);border:1px solid var(--border);border-top:none;border-radius:0 0 12px 12px;flex:1;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:10px;}

/* CARD */
.order-card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;transition:transform .15s,border-color .15s;animation:slideIn .3s ease;}
@keyframes slideIn{from{opacity:0;transform:translateY(-12px);}to{opacity:1;transform:none;}}
.order-card:hover{border-color:#444;transform:translateY(-2px);}
.order-card.urgent{border-color:var(--red)!important;animation:urgentPulse 1.5s ease-in-out infinite;}
@keyframes urgentPulse{0%,100%{border-color:var(--red);}50%{border-color:#ff8080;}}
.order-top{padding:12px 14px 10px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);}
.order-num{font-family:'Bebas Neue',sans-serif;font-size:28px;color:var(--white);letter-spacing:.04em;}
.order-meta{font-size:12px;color:var(--muted);text-align:right;}
.order-tipo{font-size:11px;font-weight:800;padding:3px 10px;border-radius:999px;text-transform:uppercase;}
.order-tipo.totem{background:rgba(245,166,35,0.15);color:var(--amber);}
.order-tipo.caixa{background:rgba(52,152,219,0.15);color:var(--blue);}
.order-items{padding:10px 14px;display:flex;flex-direction:column;gap:6px;}
.order-item{display:flex;align-items:center;gap:8px;font-size:15px;font-weight:700;}
.order-item-qty{background:rgba(255,255,255,0.08);color:var(--amber);font-size:13px;font-weight:800;padding:2px 8px;border-radius:6px;min-width:28px;text-align:center;}
.order-timer{padding:8px 14px;font-size:12px;color:var(--muted);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.timer-val{font-weight:800;}
.timer-val.ok{color:var(--green);}
.timer-val.warn{color:var(--amber);}
.timer-val.late{color:var(--red);}
.order-actions{padding:10px 14px 12px;display:flex;gap:8px;}
.btn-action{flex:1;padding:10px;border:none;border-radius:8px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;cursor:pointer;transition:all .15s;}
.btn-making{background:rgba(39,174,96,0.15);color:var(--green);border:1px solid rgba(39,174,96,0.3);}
.btn-making:hover{background:rgba(39,174,96,0.3);}
.btn-done{background:rgba(52,152,219,0.15);color:var(--blue);border:1px solid rgba(52,152,219,0.3);}
.btn-done:hover{background:rgba(52,152,219,0.3);}
.btn-cancel{background:rgba(231,76,60,0.1);color:var(--red);border:1px solid rgba(231,76,60,0.2);}
.btn-cancel:hover{background:rgba(231,76,60,0.25);}
.btn-entregue{background:rgba(39,174,96,0.25);color:var(--green);border:1px solid var(--green);font-size:14px;}
.btn-entregue:hover{background:var(--green);color:#fff;}

/* EMPTY */
.empty-col{text-align:center;padding:40px 20px;color:var(--muted);display:flex;flex-direction:column;align-items:center;gap:10px;}
.empty-icon{font-size:40px;opacity:.3;}
.empty-text{font-size:14px;}

/* TOAST */
#notif{position:fixed;bottom:24px;right:24px;z-index:999;background:var(--amber);color:#000;padding:14px 24px;border-radius:12px;font-size:16px;font-weight:800;opacity:0;pointer-events:none;transition:opacity .25s;box-shadow:0 8px 32px rgba(0,0,0,0.4);}
#notif.show{opacity:1;}

/* BANNER CHAMADA */
.call-banner{position:fixed;top:0;left:0;right:0;background:var(--green);color:#fff;text-align:center;padding:20px;font-family:'Bebas Neue',sans-serif;font-size:48px;letter-spacing:.06em;transform:translateY(-100%);transition:transform .3s ease;z-index:100;}
.call-banner.show{transform:translateY(0);}

/* BOTÃO LIMPAR */
.btn-limpar{padding:6px 14px;background:rgba(231,76,60,0.15);color:var(--red);border:1px solid rgba(231,76,60,0.3);border-radius:8px;font-family:'Nunito',sans-serif;font-size:12px;font-weight:800;cursor:pointer;}
.btn-limpar:hover{background:rgba(231,76,60,0.3);}

::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-thumb{background:#333;border-radius:99px;}
</style>
</head>

<div class="columns">
  <div class="column">
    <div class="column-header new"><span class="col-dot new"></span> NOVOS <span class="col-count" id="count-new">0</span></div>
    <div class="column-body" id="col-new"><div class="empty-col"><div class="empty-icon">🕐</div><div class="empty-text">Nenhum pedido novo</div></div></div>
  </div>
  <div class="column">
    <div class="column-header making"><span class="col-dot making"></span> PREPARANDO <span class="col-count" id="count-making">0</span></div>
    <div class="column-body" id="col-making"><div class="empty-col"><div class="empty-icon">👨‍🍳</div><div class="empty-text">Nenhum em preparo</div></div></div>
  </div>
  <div class="column">
    <div class="column-header done"><span class="col-dot done"></span> PRONTOS <span class="col-count" id="count-done">0</span></div>
    <div class="column-body" id="col-done"><div class="empty-col"><div class="empty-icon">✅</div><div class="empty-text">Nenhum pronto</div></div></div>
  </div>
</div>

<div class="call-banner" id="call-banner"></div>
<div id="notif"></div>

<script>
const API = 'http://localhost:8000';

// Estado local
// pedidos: lista de objetos { id, num, status, tipo, itens, criadoEm }
let pedidos = [];
// IDs já conhecidos para evitar duplicatas
let idsConhecidos = new Set();
let somAtivado = false;
let temposMedios = [];

// ── RELÓGIO ──────────────────────────────────────────────────────────────────
function atualizarRelogio() {
  document.getElementById('clock').textContent = new Date().toLocaleTimeString('pt-BR');
}
setInterval(atualizarRelogio, 1000);
atualizarRelogio();

// ── POLLING DO BACKEND ────────────────────────────────────────────────────────
async function buscarPedidos() {
  try {
    const r = await fetch(`${API}/cozinha/pedidos`);
    if (!r.ok) return;
    const lista = await r.json();

    for (const v of lista) {
      if (idsConhecidos.has(v.id)) {
        // Atualiza status se mudou externamente
        const p = pedidos.find(x => x.id === v.id);
        if (p && p.status !== v.status && v.status !== 'pronto') {
          p.status = v.status;
        }
        continue;
      }
      idsConhecidos.add(v.id);
      const pedido = {
        id: v.id,
        num: `#${String(v.id).padStart(3,'0')}`,
        status: v.status === 'preparando' ? 'preparando' : 'novo',
        tipo: v.origem === 'totem' ? 'totem' : 'caixa',
        mesa: v.mesa || 0,
        itens: v.itens || [],
        criadoEm: new Date(v.data),
      };
      pedidos.push(pedido);
      if (v.status === 'pendente') {
        tocarSom();
        const mesaMsg = pedido.mesa > 0 ? ` — Mesa ${pedido.mesa}` : ' — Balcão';
        toast(`🆕 Novo pedido ${pedido.num}${mesaMsg}!`);
      }
    }

    // Atualiza stat-hoje com todos pedidos do backend
    const statR = await fetch(`${API}/dashboard`);
    if (statR.ok) {
      const stat = await statR.json();
      document.getElementById('stat-hoje').textContent = stat.qtd_vendas || 0;
    }

    renderTudo();
  } catch(e) {
    // Backend offline — não faz nada, mantém estado local
  }
}

// ── RENDER ────────────────────────────────────────────────────────────────────
function renderTudo() {
  const novos   = pedidos.filter(p => p.status === 'novo');
  const fazendo = pedidos.filter(p => p.status === 'preparando');
  const prontos = pedidos.filter(p => p.status === 'pronto');

  document.getElementById('count-new').textContent    = novos.length;
  document.getElementById('count-making').textContent = fazendo.length;
  document.getElementById('count-done').textContent   = prontos.length;
  document.getElementById('stat-fila').textContent    = novos.length + fazendo.length;

  renderCol('col-new',    novos,   'novo');
  renderCol('col-making', fazendo, 'preparando');
  renderCol('col-done',   prontos, 'pronto');
}

function renderCol(colId, lista, status) {
  const col = document.getElementById(colId);
  const empty = {
    novo:       ['🕐', 'Nenhum pedido novo'],
    preparando: ['👨‍🍳', 'Nenhum em preparo'],
    pronto:     ['✅', 'Nenhum pronto'],
  };
  if (!lista.length) {
    col.innerHTML = `<div class="empty-col"><div class="empty-icon">${empty[status][0]}</div><div class="empty-text">${empty[status][1]}</div></div>`;
    return;
  }
  col.innerHTML = lista.map(p => cardHtml(p)).join('');
}

function cardHtml(p) {
  const mins = Math.floor((Date.now() - p.criadoEm) / 60000);
  const timerCls = mins < 5 ? 'ok' : mins < 10 ? 'warn' : 'late';
  const urgente  = mins >= 10 ? 'urgent' : '';
  const tipoCls  = p.tipo === 'totem' ? 'totem' : 'caixa';
  const tipoLabel = p.tipo === 'totem' ? '📱 Totem' : '🖥️ Caixa';
  const mesaLabel = p.mesa > 0 ? `Mesa ${p.mesa}` : 'Balcão';
  const mesaIcon  = p.mesa > 0 ? '🪑' : '🏪';
  const mesaCls   = p.mesa > 0 ? 'mesa-badge-mesa' : 'mesa-badge-balcao';
  const hora = p.criadoEm.toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'});

  const itensHtml = (p.itens || []).map(i =>
    `<div class="order-item">
       <span class="order-item-qty">${i.quantidade}x</span>
       <span class="order-item-name">${i.nome}</span>
     </div>`
  ).join('');

  let actions = '';
  if (p.status === 'novo') {
    actions = `
      <button class="btn-action btn-making" onclick="mover(${p.id},'preparando')">▶ Iniciar preparo</button>
      <button class="btn-action btn-cancel"  onclick="cancelar(${p.id})">✕</button>`;
  } else if (p.status === 'preparando') {
    actions = `<button class="btn-action btn-done" onclick="mover(${p.id},'pronto')">✓ Pronto!</button>`;
  } else if (p.status === 'pronto') {
    actions = `<button class="btn-action btn-entregue" onclick="entregar(${p.id})">✅ Entregue</button>`;
  }

  return `
    <div class="order-card ${urgente}" id="card-${p.id}" data-criado="${p.criadoEm.toISOString()}">
      <div class="mesa-badge ${mesaCls}">${mesaIcon} ${mesaLabel}</div>
      <div class="order-top" style="margin-top:8px">
        <div class="order-num">${p.num}</div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;">
          <span class="order-tipo ${tipoCls}">${tipoLabel}</span>
          <span class="order-meta">${hora}</span>
        </div>
      </div>
      <div class="order-items">${itensHtml}</div>
      <div class="order-timer">
        <span>⏱ Espera</span>
        <span class="timer-val ${timerCls}" id="tmr-${p.id}">${mins}m</span>
      </div>
      <div class="order-actions">${actions}</div>
    </div>`;
}

// ── AÇÕES ─────────────────────────────────────────────────────────────────────
async function mover(id, novoStatus) {
  const p = pedidos.find(x => x.id === id);
  if (!p) return;
  p.status = novoStatus;
  if (novoStatus === 'pronto') chamarCliente(p.num);
  renderTudo();
  // Atualiza backend
  try {
    await fetch(`${API}/cozinha/pedidos/${id}`, {
      method:'PATCH',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({status: novoStatus === 'pronto' ? 'concluida' : novoStatus})
    });
  } catch {}
}

async function entregar(id) {
  const p = pedidos.find(x => x.id === id);
  if (!p) return;
  const mins = Math.floor((Date.now() - p.criadoEm) / 60000);
  temposMedios.push(mins);
  const media = Math.round(temposMedios.reduce((a,b)=>a+b,0)/temposMedios.length);
  document.getElementById('stat-tempo').textContent = `${media}m`;
  pedidos = pedidos.filter(x => x.id !== id);
  toast(`✅ Pedido ${p.num} entregue!`);
  renderTudo();
  // Marca como concluída no banco de dados
  try {
    await fetch(`${API}/cozinha/pedidos/${id}`, {
      method: 'PATCH',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({status: 'concluida'})
    });
  } catch(e) { console.error('Erro ao concluir pedido:', e); }
}

async function cancelar(id) {
  if (!confirm('Cancelar este pedido?')) return;
  pedidos = pedidos.filter(x => x.id !== id);
  renderTudo();
  toast('❌ Pedido cancelado');
  try {
    await fetch(`${API}/vendas/${id}/cancelar`, { method: 'PATCH' });
  } catch(e) { console.error('Erro ao cancelar:', e); }
}

function limparEntregues() {
  pedidos = pedidos.filter(p => p.status !== 'pronto');
  renderTudo();
  toast('🗑 Prontos removidos da tela');
}

function chamarCliente(num) {
  const b = document.getElementById('call-banner');
  b.textContent = `🔔 PEDIDO ${num} PRONTO — RETIRE NO BALCÃO`;
  b.classList.add('show');
  tocarSom();
  setTimeout(() => b.classList.remove('show'), 5000);
}

// ── TIMERS ────────────────────────────────────────────────────────────────────
function atualizarTimers() {
  pedidos.forEach(p => {
    const el = document.getElementById(`tmr-${p.id}`);
    const card = document.getElementById(`card-${p.id}`);
    if (!el || !card) return;
    const mins = Math.floor((Date.now() - p.criadoEm) / 60000);
    const cls = mins < 5 ? 'ok' : mins < 10 ? 'warn' : 'late';
    el.textContent = `${mins}m`;
    el.className = `timer-val ${cls}`;
    card.classList.toggle('urgent', mins >= 10);
  });
}
setInterval(atualizarTimers, 30000);

// ── SOM ───────────────────────────────────────────────────────────────────────
document.addEventListener('click', () => { somAtivado = true; }, {once:true});
function tocarSom() {
  if (!somAtivado) return;
  try {
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    [523,659,784].forEach((f,i) => {
      const o = ctx.createOscillator(), g = ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.value = f; o.type = 'sine';
      g.gain.setValueAtTime(0.3, ctx.currentTime+i*0.15);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+i*0.15+0.3);
      o.start(ctx.currentTime+i*0.15); o.stop(ctx.currentTime+i*0.15+0.4);
    });
  } catch{}
}

// ── TOAST ─────────────────────────────────────────────────────────────────────
let toastTmr;
function toast(msg) {
  const el = document.getElementById('notif');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(toastTmr);
  toastTmr = setTimeout(() => el.classList.remove('show'), 3000);
}

// ── TECLAS DE ATALHO ──────────────────────────────────────────────────────────
// F2 = pedido demo caixa, F3 = pedido demo totem (para testes sem backend)
document.addEventListener('keydown', e => {
  if (e.key==='F2') demoAdd('caixa');
  if (e.key==='F3') demoAdd('totem');
});
const demoItens = [
  {nome:'Café Expresso',quantidade:1},
  {nome:'Cappuccino',quantidade:2},
  {nome:'Pão de Queijo',quantidade:3},
  {nome:'Suco Natural',quantidade:1},
];
function demoAdd(tipo) {
  const id = Date.now();
  idsConhecidos.add(id);
  const n = Math.floor(Math.random()*3)+1;
  const itens = Array.from({length:n}, () => demoItens[Math.floor(Math.random()*demoItens.length)]);
  pedidos.push({id, num:`#${String(pedidos.length+1).padStart(3,'0')}`, status:'novo', tipo, itens, criadoEm:new Date()});
  tocarSom(); toast(`🆕 Demo ${tipo}`); renderTudo();
}

// ── INICIAR ───────────────────────────────────────────────────────────────────
buscarPedidos();
setInterval(buscarPedidos, 8000);
renderTudo();
</script>
